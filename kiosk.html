<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kiosk - Generate Ticket</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="kiosk-container">
    <button id="btn-ticket" class="btn-huge">
      <div class="ar">اضغط للحصول على تذكرة</div>
      <div class="fr">Appuyez pour obtenir un ticket</div>
    </button>
    <div id="ticket-display" class="ticket-display">
      <div class="ar">رقمك</div>
      <div class="fr">Votre Numéro</div>
      <div id="ticket-number" style="font-size: 8rem;">--</div>
    </div>
  </div>
  <script type="module" src="assets/js/kiosk.js"></script>
</body>
</html>
